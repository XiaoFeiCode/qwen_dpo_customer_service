model:
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  trust_remote_code: true

data:
  raw_file: data/raw/customer_service_seed.jsonl
  sft_file: data/processed/sft_train.jsonl
  dpo_file: data/processed/dpo_train.jsonl
  eval_file: data/processed/eval.jsonl

sft:
  output_dir: checkpoints/sft-lora
  max_length: 1024
  epochs: 1
  batch_size: 1
  grad_accum: 8
  learning_rate: 0.0002

dpo:
  output_dir: checkpoints/dpo-lora
  max_length: 1024
  max_prompt_length: 512
  epochs: 1
  batch_size: 1
  grad_accum: 8
  learning_rate: 0.00005
  beta: 0.1

lora:
  r: 16
  alpha: 32
  dropout: 0.05
